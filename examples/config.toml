# termato 配置文件
# 放置于 ~/.config/termato/config.toml

[timer]
# 专注时长（分钟）
focus_minutes = 25
# 短休息时长（分钟）
short_break_minutes = 5
# 长休息时长（分钟）
long_break_minutes = 15
# 每完成几个番茄后进入长休息
rounds_before_long_break = 4

[notification]
# 是否发送桌面通知
desktop = true
# 是否播放提示音（终端响铃）
sound = true

[theme]
# 支持颜色名称: Red, Green, Blue, Cyan, Magenta, Yellow, White, Black
# 也支持十六进制: "#ff5555"
focus_color = "Red"
break_color = "Green"
long_break_color = "Cyan"
digit_color = "White"

[ui]
# 幽灵模式：隐藏倒计时数字，仅显示极简提示（缓解时间焦虑）
ghost_mode = false
# 状态文件导出路径（供 tmux/Polybar 等外部工具读取）
status_file = "/tmp/termato.status"

[hooks]
# 专注开始时执行的 Shell 命令（可选）
# 环境变量: $TERMATO_EVENT, $TERMATO_TASK
# on_start = "osascript -e 'set volume output muted true'"
# 进入休息时执行的 Shell 命令
# on_break = "osascript -e 'set volume output muted false'"
# 番茄完成时执行的 Shell 命令
# on_complete = "afplay /System/Library/Sounds/Glass.aiff"
